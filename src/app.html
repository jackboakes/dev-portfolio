<!doctype html>
<html lang="en" class="scroll-smooth">
	<head>
		<title>Jack Boakes</title>
		<meta property="og:title" content="Jack Boakes Portfolio" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://jackboakes.com" />
		<meta
			property="og:description"
			content="I'm Jack Boakes, a final year Bachelor of Computer Science student at Deakin University focused on gameplay programming, tools and engine development."
		/>
		<meta property="og:image" content="https://jackboakes.com/og_image.jpg" />
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="icon" href="/favicon.ico" />

		<!-- Font preloads -->
		<link
			rel="preload"
			href="/fonts/shippori-mincho-latin-800-normal.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/inter-latin-400-normal.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/inter-latin-600-normal.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
